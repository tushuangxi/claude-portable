name: Build & Release

on:
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'Claude Code version (leave empty for latest)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push: use the tag as version
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "Version from tag: ${GITHUB_REF#refs/tags/}"
          else
            # Manual trigger: auto-increment patch from latest stable tag
            git fetch --tags
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              NEW_VER="v0.2.0"
            else
              RAW="${LATEST#v}"
              MAJOR="${RAW%%.*}"
              REST="${RAW#*.}"
              MINOR="${REST%%.*}"
              PATCH="${REST#*.}"
              PATCH=$((PATCH + 1))
              NEW_VER="v${MAJOR}.${MINOR}.${PATCH}"
            fi
            echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
            echo "Auto version: $NEW_VER"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine Claude Code version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.claude_version }}" ]; then
            VER="${{ github.event.inputs.claude_version }}"
          else
            VER=$(npm view @anthropic-ai/claude-code version)
          fi
          echo "claude_version=$VER" >> "$GITHUB_OUTPUT"
          echo "Claude Code version: $VER"

      - name: Download Claude Code binaries
        run: |
          set -euo pipefail
          mkdir -p bin/macos-arm64 bin/macos-x64 bin/linux-x64 bin/windows-x64

          BASE="https://downloads.claude.ai/claude-code-releases"

          # Get latest version from CDN
          CDN_VER=$(curl -fsSL "$BASE/latest" 2>/dev/null || echo "")
          if [ -z "$CDN_VER" ]; then
            CDN_VER="${{ steps.version.outputs.claude_version }}"
          fi
          echo "Claude Code version: $CDN_VER"

          # Download each platform binary
          download_platform() {
            local platform="$1"
            local dest="$2"
            echo "  Downloading $platform..."
            if curl -fsSL --retry 3 "$BASE/$CDN_VER/$platform/claude" -o "$dest" 2>/dev/null; then
              echo "    OK: $(du -h "$dest" | cut -f1)"
              return 0
            fi
            echo "    Failed"
            rm -f "$dest"
            return 1
          }

          download_platform "linux-x64"    "bin/linux-x64/claude" || true
          download_platform "darwin-arm64" "bin/macos-arm64/claude" || true
          download_platform "darwin-x64"   "bin/macos-x64/claude" || true

          # Windows binary name is claude.exe
          echo "  Downloading win32-x64..."
          curl -fsSL --retry 3 "$BASE/$CDN_VER/win32-x64/claude.exe" -o "bin/windows-x64/claude.exe" 2>/dev/null \
            || { echo "    Failed"; rm -f "bin/windows-x64/claude.exe"; } || true

          # Count successes
          FOUND=0
          for f in bin/*/claude bin/*/claude.exe; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              FOUND=$((FOUND + 1))
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "FATAL: Cannot download any Claude Code binary from CDN"
            echo "Tried: $BASE/$CDN_VER/{platform}/claude"
            exit 1
          fi

          chmod +x bin/*/claude 2>/dev/null || true
          echo "Done. $FOUND platform(s) ready."

      - name: Download CC Switch
        run: |
          set -euo pipefail
          echo "Downloading CC Switch from our auxiliary release..."
          BASE="https://github.com/yuluyangguang1/codex-portable/releases/download/cc-switch-assets"

          # macOS (universal binary, same file for arm64 and x64)
          echo "  macOS..."
          curl -fsSL --retry 3 -o bin/macos-arm64/cc-switch "${BASE}/cc-switch-macos" || true
          if [ -f bin/macos-arm64/cc-switch ] && [ -s bin/macos-arm64/cc-switch ]; then
            cp bin/macos-arm64/cc-switch bin/macos-x64/cc-switch
            chmod +x bin/macos-arm64/cc-switch bin/macos-x64/cc-switch
            echo "    OK: macOS cc-switch"
          fi

          # Linux x64
          echo "  Linux..."
          curl -fsSL --retry 3 -o bin/linux-x64/cc-switch "${BASE}/cc-switch-linux-x64" || true
          if [ -f bin/linux-x64/cc-switch ] && [ -s bin/linux-x64/cc-switch ]; then
            chmod +x bin/linux-x64/cc-switch
            echo "    OK: Linux cc-switch"
          else
            rm -f bin/linux-x64/cc-switch
          fi

          # Windows x64
          echo "  Windows..."
          curl -fsSL --retry 3 -o bin/windows-x64/cc-switch.exe "${BASE}/cc-switch-windows-x64.exe" || true
          if [ -f bin/windows-x64/cc-switch.exe ] && [ -s bin/windows-x64/cc-switch.exe ]; then
            echo "    OK: Windows cc-switch.exe"
          else
            rm -f bin/windows-x64/cc-switch.exe
            echo "    WARN: Windows cc-switch.exe download failed"
          fi

          echo "CC Switch download complete."

          # Windows: include sqlite3.exe for DB read support
          echo "  Downloading sqlite3.exe..."
          curl -fsSL -o bin/windows-x64/sqlite3.exe "https://github.com/nalgeon/sqlite/releases/download/3.49.1/sqlite3.exe" 2>/dev/null || true
          if [ -f bin/windows-x64/sqlite3.exe ] && [ -s bin/windows-x64/sqlite3.exe ]; then
            echo "    OK: sqlite3.exe"
          else
            rm -f bin/windows-x64/sqlite3.exe
          fi

      - name: Set executable permissions
        run: |
          chmod +x bin/*/claude 2>/dev/null || true
          chmod +x bin/*/cc-switch 2>/dev/null || true
          chmod +x ClaudePortable.command ClaudePortable.sh

      - name: Create release zip
        run: |
          set -e
          STAGE="/tmp/ClaudeCodePortable"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          # Copy everything
          cp -a bin/ "$STAGE/bin/"
          cp -a config/ "$STAGE/config/"
          cp -a lib/ "$STAGE/lib/"
          mkdir -p "$STAGE/data"
          cp ClaudePortable.command ClaudePortable.sh ClaudePortable.bat "$STAGE/"
          # CRLF normalize .bat (GNU sed \r is literal 'r', use Python)
          python3 -c "import sys;c=open('$STAGE/ClaudePortable.bat','rb').read();open('$STAGE/ClaudePortable.bat','wb').write(c.replace(b'\r\n',b'\n').replace(b'\n',b'\r\n'))"
          # Make Unix scripts executable
          chmod +x "$STAGE/ClaudePortable.command" "$STAGE/ClaudePortable.sh" "$STAGE/lib/binding.sh" 2>/dev/null || true
          cp ClaudePortable使用说明.html "$STAGE/" 2>/dev/null || true
          cp MACOS-FIRST-RUN.txt "$STAGE/" 2>/dev/null || true
          cp README.md "$STAGE/"
          cp .gitignore "$STAGE/" 2>/dev/null || true
          # Ensure data folder is empty (no stray .lock from build)
          rm -f "$STAGE/data/.lock" 2>/dev/null || true

          # Create zip
          cd /tmp
          zip -yrq ClaudeCodePortable.zip ClaudeCodePortable/
          mv ClaudeCodePortable.zip "$GITHUB_WORKSPACE/"
          ls -lh "$GITHUB_WORKSPACE/ClaudeCodePortable.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCodePortable
          path: ClaudeCodePortable.zip
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ClaudeCodePortable
          path: .

      - name: Set release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ needs.build.outputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Compose release notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          {
            echo "## Claude Code Portable $TAG"
            echo ""
            echo "便携版 Claude Code + CC Switch，零安装，即插即用。"
            echo ""
            echo "### 下载"
            echo ""
            echo "| 文件 | 说明 |"
            echo "|---|---|"
            echo "| [ClaudeCodePortable.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/ClaudeCodePortable.zip) | 全平台通用包 |"
            echo ""
            echo "### 启动方式"
            echo ""
            echo "| 平台 | 操作 |"
            echo "|---|---|"
            echo "| macOS | \`./ClaudePortable.command\` |"
            echo "| Linux | \`./ClaudePortable.sh\` |"
            echo "| Windows | 双击 \`ClaudePortable.bat\` |"
            echo ""
            echo "### 首次使用"
            echo ""
            echo "1. 解压到任意目录"
            echo "2. 运行启动脚本"
            echo "3. 按提示配置 API（支持 CC Switch 图形界面或命令行）"
            echo "4. 开始使用 Claude Code"
            echo ""
            echo "### SHA-256"
            echo ""
            echo "\`\`\`"
            sha256sum ClaudeCodePortable.zip 2>/dev/null || shasum -a 256 ClaudeCodePortable.zip
            echo "\`\`\`"
          } > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: ClaudeCodePortable.zip
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: false
