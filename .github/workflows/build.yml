name: Build & Release

on:
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'Claude Code version (leave empty for latest)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine Claude Code version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.claude_version }}" ]; then
            VER="${{ github.event.inputs.claude_version }}"
          else
            VER=$(npm view @anthropic-ai/claude-code version)
          fi
          echo "claude_version=$VER" >> "$GITHUB_OUTPUT"
          echo "Claude Code version: $VER"

      - name: Download Claude Code binaries
        run: |
          set -euo pipefail
          mkdir -p bin/macos-arm64 bin/macos-x64 bin/linux-x64 bin/windows-x64

          VER="${{ steps.version.outputs.claude_version }}"
          BASE="https://downloads.claude.ai/claude-code-releases"

          # Download platform binaries from official CDN
          echo "Downloading Claude Code v$VER binaries..."

          # Linux x64
          echo "  linux-x64..."
          curl -fsSL "$BASE/claude-code-linux-x64-v$VER.tar.gz" -o /tmp/linux.tar.gz 2>/dev/null \
            || curl -fsSL "$BASE/linux-x64/claude" -o bin/linux-x64/claude 2>/dev/null \
            || true
          if [ -f /tmp/linux.tar.gz ]; then
            tar -xzf /tmp/linux.tar.gz -C bin/linux-x64/ 2>/dev/null || true
          fi

          # macOS arm64
          echo "  macos-arm64..."
          curl -fsSL "$BASE/claude-code-darwin-arm64-v$VER.tar.gz" -o /tmp/mac-arm.tar.gz 2>/dev/null \
            || curl -fsSL "$BASE/darwin-arm64/claude" -o bin/macos-arm64/claude 2>/dev/null \
            || true
          if [ -f /tmp/mac-arm.tar.gz ]; then
            tar -xzf /tmp/mac-arm.tar.gz -C bin/macos-arm64/ 2>/dev/null || true
          fi

          # macOS x64
          echo "  macos-x64..."
          curl -fsSL "$BASE/claude-code-darwin-x64-v$VER.tar.gz" -o /tmp/mac-x64.tar.gz 2>/dev/null \
            || curl -fsSL "$BASE/darwin-x64/claude" -o bin/macos-x64/claude 2>/dev/null \
            || true
          if [ -f /tmp/mac-x64.tar.gz ]; then
            tar -xzf /tmp/mac-x64.tar.gz -C bin/macos-x64/ 2>/dev/null || true
          fi

          # Windows x64
          echo "  windows-x64..."
          curl -fsSL "$BASE/claude-code-win32-x64-v$VER.tar.gz" -o /tmp/win.tar.gz 2>/dev/null \
            || curl -fsSL "$BASE/win32-x64/claude.exe" -o bin/windows-x64/claude.exe 2>/dev/null \
            || true
          if [ -f /tmp/win.tar.gz ]; then
            tar -xzf /tmp/win.tar.gz -C bin/windows-x64/ 2>/dev/null || true
          fi

          # Fallback: use the native installer script to get linux binary
          FOUND=0
          for f in bin/*/claude bin/*/claude.exe; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              FOUND=$((FOUND + 1))
              echo "  OK: $f ($(du -h "$f" | cut -f1))"
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "CDN download failed. Trying native installer..."
            curl -fsSL https://claude.ai/install.sh | bash -s -- --yes 2>/dev/null || true
            CLAUDE_BIN="$HOME/.local/bin/claude"
            if [ -f "$CLAUDE_BIN" ]; then
              cp "$CLAUDE_BIN" bin/linux-x64/claude
              echo "  Fallback OK: linux-x64 from native installer"
              FOUND=1
            fi
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "FATAL: Cannot obtain any Claude Code binary"
            exit 1
          fi

          chmod +x bin/*/claude 2>/dev/null || true
          echo "Done. $FOUND platform(s) ready."

      - name: Download CC Switch
        run: |
          # CC Switch releases (if available from a known source)
          # For now, skip if not available — users can add their own
          echo "CC Switch: checking for pre-built releases..."
          # TODO: Add CC Switch download from its release page
          # For now, the workflow packages whatever is in bin/
          echo "CC Switch will be included if present in the repo"

      - name: Set executable permissions
        run: |
          chmod +x bin/*/claude 2>/dev/null || true
          chmod +x bin/*/cc-switch 2>/dev/null || true
          chmod +x ClaudePortable.command ClaudePortable.sh

      - name: Create release zip
        run: |
          set -e
          STAGE="/tmp/ClaudeCodePortable"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          # Copy everything
          cp -a bin/ "$STAGE/bin/"
          cp -a config/ "$STAGE/config/"
          mkdir -p "$STAGE/data"
          cp ClaudePortable.command ClaudePortable.sh ClaudePortable.bat "$STAGE/"
          cp README.md "$STAGE/"
          cp .gitignore "$STAGE/" 2>/dev/null || true

          # Create zip
          cd /tmp
          zip -yrq ClaudeCodePortable.zip ClaudeCodePortable/
          mv ClaudeCodePortable.zip "$GITHUB_WORKSPACE/"
          ls -lh "$GITHUB_WORKSPACE/ClaudeCodePortable.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCodePortable
          path: ClaudeCodePortable.zip
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ClaudeCodePortable
          path: .

      - name: Compose release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo "## Claude Code Portable $TAG"
            echo ""
            echo "便携版 Claude Code + CC Switch，零安装，即插即用。"
            echo ""
            echo "### 下载"
            echo ""
            echo "| 文件 | 说明 |"
            echo "|---|---|"
            echo "| [ClaudeCodePortable.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/ClaudeCodePortable.zip) | 全平台通用包 |"
            echo ""
            echo "### 启动方式"
            echo ""
            echo "| 平台 | 操作 |"
            echo "|---|---|"
            echo "| macOS | \`./ClaudePortable.command\` |"
            echo "| Linux | \`./ClaudePortable.sh\` |"
            echo "| Windows | 双击 \`ClaudePortable.bat\` |"
            echo ""
            echo "### 首次使用"
            echo ""
            echo "1. 解压到任意目录"
            echo "2. 运行启动脚本"
            echo "3. 按提示配置 API（支持 CC Switch 图形界面或命令行）"
            echo "4. 开始使用 Claude Code"
            echo ""
            echo "### SHA-256"
            echo ""
            echo "\`\`\`"
            sha256sum ClaudeCodePortable.zip 2>/dev/null || shasum -a 256 ClaudeCodePortable.zip
            echo "\`\`\`"
          } > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: ClaudeCodePortable.zip
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: false
