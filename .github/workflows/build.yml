name: Build & Release

on:
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'Claude Code version (leave empty for latest)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine Claude Code version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.claude_version }}" ]; then
            VER="${{ github.event.inputs.claude_version }}"
          else
            VER=$(npm view @anthropic-ai/claude-code version)
          fi
          echo "claude_version=$VER" >> "$GITHUB_OUTPUT"
          echo "Claude Code version: $VER"

      - name: Download Claude Code binaries
        run: |
          set -euo pipefail
          mkdir -p bin/macos-arm64 bin/macos-x64 bin/linux-x64 bin/windows-x64

          BASE="https://downloads.claude.ai/claude-code-releases"

          # Get latest version from CDN
          CDN_VER=$(curl -fsSL "$BASE/latest" 2>/dev/null || echo "")
          if [ -z "$CDN_VER" ]; then
            CDN_VER="${{ steps.version.outputs.claude_version }}"
          fi
          echo "Claude Code version: $CDN_VER"

          # Download each platform binary
          download_platform() {
            local platform="$1"
            local dest="$2"
            echo "  Downloading $platform..."
            if curl -fsSL --retry 3 "$BASE/$CDN_VER/$platform/claude" -o "$dest" 2>/dev/null; then
              echo "    OK: $(du -h "$dest" | cut -f1)"
              return 0
            fi
            echo "    Failed"
            rm -f "$dest"
            return 1
          }

          download_platform "linux-x64"    "bin/linux-x64/claude" || true
          download_platform "darwin-arm64" "bin/macos-arm64/claude" || true
          download_platform "darwin-x64"   "bin/macos-x64/claude" || true

          # Windows binary name is claude.exe
          echo "  Downloading win32-x64..."
          curl -fsSL --retry 3 "$BASE/$CDN_VER/win32-x64/claude.exe" -o "bin/windows-x64/claude.exe" 2>/dev/null \
            || { echo "    Failed"; rm -f "bin/windows-x64/claude.exe"; } || true

          # Count successes
          FOUND=0
          for f in bin/*/claude bin/*/claude.exe; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              FOUND=$((FOUND + 1))
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "FATAL: Cannot download any Claude Code binary from CDN"
            echo "Tried: $BASE/$CDN_VER/{platform}/claude"
            exit 1
          fi

          chmod +x bin/*/claude 2>/dev/null || true
          echo "Done. $FOUND platform(s) ready."

      - name: Download CC Switch
        run: |
          set -euo pipefail
          echo "Downloading CC Switch from GitHub releases..."
          BASE="https://github.com/farion1231/cc-switch/releases/latest/download"

          # macOS (universal dmg -> extract app)
          echo "  macOS..."
          curl -fsSL -o /tmp/ccswitch-mac.tar.gz "$BASE/CC-Switch-$(curl -fsSL https://api.github.com/repos/farion1231/cc-switch/releases/latest | grep -o '"tag_name":"[^"]*"' | cut -d'"' -f4 | sed 's/^v//')-macOS.tar.gz" 2>/dev/null || true
          if [ -f /tmp/ccswitch-mac.tar.gz ] && [ -s /tmp/ccswitch-mac.tar.gz ]; then
            mkdir -p /tmp/ccswitch-mac
            tar -xzf /tmp/ccswitch-mac.tar.gz -C /tmp/ccswitch-mac 2>/dev/null || true
            # Find the binary inside the .app bundle
            CCS_BIN=$(find /tmp/ccswitch-mac -name "CC-Switch" -o -name "cc-switch" -type f 2>/dev/null | head -1)
            if [ -n "$CCS_BIN" ] && [ -f "$CCS_BIN" ]; then
              cp "$CCS_BIN" bin/macos-arm64/cc-switch
              cp "$CCS_BIN" bin/macos-x64/cc-switch
              chmod +x bin/macos-arm64/cc-switch bin/macos-x64/cc-switch
              echo "    OK: macOS cc-switch"
            fi
          fi

          # Linux x64 (AppImage)
          echo "  Linux..."
          LATEST_TAG=$(curl -fsSL https://api.github.com/repos/farion1231/cc-switch/releases/latest | grep -o '"tag_name":"[^"]*"' | cut -d'"' -f4 | sed 's/^v//') || LATEST_TAG=""
          curl -fsSL -o bin/linux-x64/cc-switch "$BASE/CC-Switch-v${LATEST_TAG}-Linux-x86_64.AppImage" 2>/dev/null || true
          if [ -f bin/linux-x64/cc-switch ] && [ -s bin/linux-x64/cc-switch ]; then
            chmod +x bin/linux-x64/cc-switch
            echo "    OK: Linux cc-switch (AppImage)"
          else
            rm -f bin/linux-x64/cc-switch
          fi

          # Windows (portable zip)
          echo "  Windows..."
          curl -fsSL -o /tmp/ccswitch-win.zip "$BASE/CC-Switch-v${LATEST_TAG}-Windows-Portable.zip" 2>/dev/null || true
          if [ -f /tmp/ccswitch-win.zip ] && [ -s /tmp/ccswitch-win.zip ]; then
            mkdir -p /tmp/ccswitch-win
            unzip -qo /tmp/ccswitch-win.zip -d /tmp/ccswitch-win 2>/dev/null || true
            CCS_EXE=$(find /tmp/ccswitch-win -name "CC-Switch.exe" -o -name "cc-switch.exe" 2>/dev/null | head -1)
            if [ -n "$CCS_EXE" ] && [ -f "$CCS_EXE" ]; then
              cp "$CCS_EXE" bin/windows-x64/cc-switch.exe
              echo "    OK: Windows cc-switch.exe"
            fi
          fi

          echo "CC Switch download complete."

      - name: Set executable permissions
        run: |
          chmod +x bin/*/claude 2>/dev/null || true
          chmod +x bin/*/cc-switch 2>/dev/null || true
          chmod +x ClaudePortable.command ClaudePortable.sh

      - name: Create release zip
        run: |
          set -e
          STAGE="/tmp/ClaudeCodePortable"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          # Copy everything
          cp -a bin/ "$STAGE/bin/"
          cp -a config/ "$STAGE/config/"
          mkdir -p "$STAGE/data"
          cp ClaudePortable.command ClaudePortable.sh ClaudePortable.bat "$STAGE/"
          cp README.md "$STAGE/"
          cp .gitignore "$STAGE/" 2>/dev/null || true

          # Create zip
          cd /tmp
          zip -yrq ClaudeCodePortable.zip ClaudeCodePortable/
          mv ClaudeCodePortable.zip "$GITHUB_WORKSPACE/"
          ls -lh "$GITHUB_WORKSPACE/ClaudeCodePortable.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCodePortable
          path: ClaudeCodePortable.zip
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ClaudeCodePortable
          path: .

      - name: Compose release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo "## Claude Code Portable $TAG"
            echo ""
            echo "便携版 Claude Code + CC Switch，零安装，即插即用。"
            echo ""
            echo "### 下载"
            echo ""
            echo "| 文件 | 说明 |"
            echo "|---|---|"
            echo "| [ClaudeCodePortable.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/ClaudeCodePortable.zip) | 全平台通用包 |"
            echo ""
            echo "### 启动方式"
            echo ""
            echo "| 平台 | 操作 |"
            echo "|---|---|"
            echo "| macOS | \`./ClaudePortable.command\` |"
            echo "| Linux | \`./ClaudePortable.sh\` |"
            echo "| Windows | 双击 \`ClaudePortable.bat\` |"
            echo ""
            echo "### 首次使用"
            echo ""
            echo "1. 解压到任意目录"
            echo "2. 运行启动脚本"
            echo "3. 按提示配置 API（支持 CC Switch 图形界面或命令行）"
            echo "4. 开始使用 Claude Code"
            echo ""
            echo "### SHA-256"
            echo ""
            echo "\`\`\`"
            sha256sum ClaudeCodePortable.zip 2>/dev/null || shasum -a 256 ClaudeCodePortable.zip
            echo "\`\`\`"
          } > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: ClaudeCodePortable.zip
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: false
